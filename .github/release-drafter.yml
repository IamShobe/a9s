name-template: "v$RESOLVED_VERSION 🌈"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "🧰 Maintenance"
    label: "chore"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
  patch:
    labels:
      - "patch"
  default: patch
exclude-labels:
  - "skip-changelog"
template: |
  ## How to install

  [npm - @a9s/cli $RESOLVED_VERSION](https://www.npmjs.com/package/@a9s/cli/v/$RESOLVED_VERSION)

  Install globally:
  ```bash
  npm install -g @a9s/cli@$RESOLVED_VERSION
  a9s
  ```

  Or use with npx:
  ```bash
  npx @a9s/cli@$RESOLVED_VERSION
  ```

  ## Changes

  $CHANGES
